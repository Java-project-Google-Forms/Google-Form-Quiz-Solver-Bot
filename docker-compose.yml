services:

  app:
    build: .
    image: ${DOCKER_IMAGE:-google-form-quiz-bot}:${VERSION:-latest}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
